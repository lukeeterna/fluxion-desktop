<!DOCTYPE html>
<html>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

body {
  font-family:'DM Sans',sans-serif;
  background:var(--color-background-tertiary);
  color:var(--color-text-primary);
  padding:20px 16px 40px;
}

h1 {
  font-family:'Playfair Display',serif;
  font-size:22px;
  font-weight:400;
  letter-spacing:-0.5px;
  margin-bottom:4px;
}
.subtitle {
  font-size:12px;
  color:var(--color-text-tertiary);
  font-family:'DM Mono',monospace;
  margin-bottom:20px;
}

/* Nav pills */
.nav {
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;
}
.pill {
  font-size:11px;padding:5px 10px;border-radius:20px;cursor:pointer;
  border:1px solid var(--color-border-tertiary);
  background:var(--color-background-secondary);
  color:var(--color-text-secondary);
  transition:all .2s;font-family:'DM Mono',monospace;
  white-space:nowrap;
}
.pill:hover{border-color:var(--color-border-primary);color:var(--color-text-primary);}
.pill.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent;}

/* Card */
.card {display:none;animation:fadeIn .25s ease;}
.card.visible{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Header settore */
.sector-header {
  display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;
}
.sector-icon {
  font-size:28px;line-height:1;flex-shrink:0;margin-top:2px;
}
.sector-title {
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:700;letter-spacing:-0.3px;
}
.sector-meta {
  font-size:11px;color:var(--color-text-tertiary);
  font-family:'DM Mono',monospace;margin-top:2px;
}

/* Dati reali badge */
.data-strip {
  display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;
}
.data-badge {
  font-size:10px;font-family:'DM Mono',monospace;
  padding:4px 8px;border-radius:4px;
  background:var(--color-background-info);
  color:var(--color-text-info);
  border:1px solid var(--color-border-info);
  line-height:1.3;
}
.data-badge strong{font-weight:500;}

/* Timeline */
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:12px;position:relative;}
.tl-left{
  display:flex;flex-direction:column;align-items:center;width:44px;flex-shrink:0;
}
.tl-dot{
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-family:'DM Mono',monospace;
  font-weight:500;flex-shrink:0;
}
.tl-dot.pain{background:#1a1a1a;color:#fff;}
.tl-dot.hook{background:#2d2d2d;color:#888;}
.tl-dot.sol{background:#0d6e3f;color:#7ee8b3;}
.tl-dot.cta{background:#c9340a;color:#fff;}
.tl-line{flex:1;width:1px;background:var(--color-border-tertiary);margin:4px 0;}
.tl-body{flex:1;padding-bottom:20px;}
.tl-label{
  font-size:10px;font-family:'DM Mono',monospace;
  color:var(--color-text-tertiary);margin-bottom:6px;letter-spacing:.5px;
}
.tl-timing{
  display:inline-block;font-size:9px;font-family:'DM Mono',monospace;
  padding:2px 6px;border-radius:3px;margin-bottom:8px;
  background:var(--color-background-secondary);
  border:1px solid var(--color-border-tertiary);
  color:var(--color-text-secondary);
}

/* Scena */
.scena{
  font-size:12px;line-height:1.6;color:var(--color-text-secondary);
  padding:10px 12px;border-left:2px solid var(--color-border-secondary);
  margin-bottom:8px;font-style:italic;
}

/* Voiceover */
.vo{
  font-family:'Playfair Display',serif;
  font-size:15px;line-height:1.65;
  padding:12px 14px;
  border-radius:8px;
  background:var(--color-background-secondary);
  position:relative;
}
.vo em{
  font-family:'DM Mono',monospace;font-style:normal;
  font-size:11px;color:var(--color-text-tertiary);
  display:block;margin-top:4px;
}
.vo .punch{
  display:block;
  font-weight:700;font-style:italic;
  color:var(--color-text-primary);
  margin-top:6px;letter-spacing:.3px;
}

/* CTA frame */
.cta-frame{
  background:#0a0a0a;color:#fff;
  border-radius:8px;padding:16px;
  font-family:'DM Mono',monospace;
  text-align:center;
}
.cta-brand{font-size:22px;font-weight:500;letter-spacing:2px;margin-bottom:4px;}
.cta-sub{font-size:10px;color:#666;margin-bottom:12px;}
.cta-price{font-size:18px;font-weight:500;margin-bottom:4px;}
.cta-vs{font-size:11px;color:#e05252;margin-bottom:8px;}
.cta-url{font-size:11px;color:#7eb0ff;}

/* WA preview */
.wa-box{
  margin-top:16px;
  border:1px solid var(--color-border-tertiary);
  border-radius:10px;overflow:hidden;
}
.wa-header{
  background:#075e54;color:#fff;
  padding:8px 12px;font-size:10px;
  display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;
}
.wa-avatar{
  width:24px;height:24px;border-radius:50%;
  background:#25d366;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:500;color:#075e54;flex-shrink:0;
}
.wa-body{padding:12px;}
.wa-bubble{
  background:#dcf8c6;color:#111;
  border-radius:8px 8px 2px 8px;
  padding:8px 10px;font-size:12px;line-height:1.5;
  display:inline-block;max-width:90%;
}
.wa-time{font-size:9px;color:#999;text-align:right;margin-top:4px;font-family:'DM Mono',monospace;}

/* Fonte tag */
.fonte{
  font-size:9px;font-family:'DM Mono',monospace;
  color:var(--color-text-tertiary);vertical-align:super;
}

/* Nav bottom */
.nav-bottom{display:flex;justify-content:space-between;margin-top:24px;gap:8px;}
.nav-btn{
  font-size:11px;padding:8px 14px;border-radius:6px;cursor:pointer;
  border:1px solid var(--color-border-secondary);
  background:var(--color-background-secondary);
  color:var(--color-text-primary);font-family:'DM Mono',monospace;
  transition:all .2s;flex:1;text-align:center;
}
.nav-btn:hover{background:var(--color-text-primary);color:var(--color-background-primary);}
</style>

const COLORS = {hook:'#2d2d2d', pain:'#1a1a1a', sol:'#0d6e3f', cta:'#c9340a'};
const LABELS = {hook:'SILENZIO', pain:'DOLORE', sol:'SOLUZIONE', cta:'CTA'};

function renderDot(type){
  return `<div class="tl-dot ${type}">${LABELS[type].slice(0,2)}</div>`;
}

function renderClip(clip, isLast){
  const isVO = clip.vo && clip.type !== 'cta';
  const isCTA = clip.type === 'cta';
  return `
    <div class="tl-item">
      <div class="tl-left">
        ${renderDot(clip.type)}
        ${!isLast ? '<div class="tl-line"></div>' : ''}
      </div>
      <div class="tl-body">
        <div class="tl-label">${clip.label}</div>
        <span class="tl-timing">${clip.timing}${clip.tono ? ' · ' + clip.tono : ''}</span>
        ${clip.scena ? `<div class="scena">${clip.scena}</div>` : ''}
        ${clip.vo && !isCTA ? `<div class="vo">"${clip.vo}"${clip.fonte ? `<em>Fonte: ${clip.fonte}</em>` : ''}</div>` : ''}
        ${isCTA && clip.vo ? `<div class="vo" style="margin-bottom:10px"><em style="font-style:italic;font-size:14px;font-family:'Playfair Display',serif;color:var(--color-text-secondary);">${clip.vo}</em></div>` : ''}
        ${isCTA && clip.cta ? `
          <div class="cta-frame">
            <div class="cta-brand">${clip.cta.brand}</div>
            <div class="cta-sub">${clip.cta.sub}</div>
            <div class="cta-price">${clip.cta.price}</div>
            <div class="cta-vs">${clip.cta.vs}</div>
            <div class="cta-url">${clip.cta.url}</div>
          </div>
        ` : ''}
        ${isCTA && clip.wa ? `
          <div class="wa-box">
            <div class="wa-header">
              <div class="wa-avatar">LF</div>
              <span>Luca Ferretti · WA Day 0</span>
            </div>
            <div class="wa-body">
              <div class="wa-bubble">${clip.wa.replace(/\n/g,'<br>')}</div>
              <div class="wa-time">Ora ✓✓</div>
            </div>
          </div>
        ` : ''}
      </div>
    </div>
  `;
}

function renderCard(s){
  return `
    <div class="card" id="card-${s.id}">
      <div class="sector-header">
        <div class="sector-icon">${s.icon}</div>
        <div>
          <div class="sector-title">${s.label}</div>
          <div class="sector-meta">${s.meta}</div>
        </div>
      </div>
      <div class="data-strip">
        ${s.dati.map(d=>`<div class="data-badge"><strong>${d.val}</strong> ${d.desc} <span class="fonte">[${d.fonte}]</span></div>`).join('')}
      </div>
      <div class="timeline">
        ${s.clips.map((c,i)=>renderClip(c, i===s.clips.length-1)).join('')}
      </div>
      <div class="nav-bottom">
        <div class="nav-btn" onclick="prevSector('${s.id}')">← Precedente</div>
        <div class="nav-btn" onclick="nextSector('${s.id}')">Successivo →</div>
      </div>
    </div>
  `;
}

// Build UI
const navEl = document.getElementById('nav');
const cardsEl = document.getElementById('cards');
let current = SETTORI[0].id;

SETTORI.forEach((s,i)=>{
  const pill = document.createElement('div');
  pill.className = 'pill' + (i===0?' active':'');
  pill.id = 'pill-'+s.id;
  pill.textContent = s.icon+' '+s.label;
  pill.onclick = ()=>show(s.id);
  navEl.appendChild(pill);
  cardsEl.innerHTML += renderCard(s);
});

document.getElementById('card-'+current).classList.add('visible');

function show(id){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('visible'));
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  document.getElementById('card-'+id).classList.add('visible');
  document.getElementById('pill-'+id).classList.add('active');
  current = id;
}

function nextSector(id){
  const idx = SETTORI.findIndex(s=>s.id===id);
  const next = SETTORI[(idx+1)%SETTORI.length];
  show(next.id);
}
function prevSector(id){
  const idx = SETTORI.findIndex(s=>s.id===id);
  const prev = SETTORI[(idx-1+SETTORI.length)%SETTORI.length];
  show(prev.id);
}
</script>
