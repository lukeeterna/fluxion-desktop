# =============================================================================
# FLUXION — VirusTotal Pre-Release Gate (S184 α.3.0-D)
# =============================================================================
# Goal: catch antivirus false positives BEFORE customers download the build.
#
# Strategy (free-tier compatible — VT free has 32MB upload + 4 req/min limits):
#   1. Compute SHA256 of every release artifact (MSI/DMG/AppImage)
#   2. Query VT v3 GET /files/{sha256}  — hash lookup is unlimited
#   3a. If known: read detection count; fail if > VT_MAX_DETECTIONS
#   3b. If unknown AND file ≤ 32MB: POST to /files for fresh scan
#   3c. If unknown AND file > 32MB: emit warning, require manual upload
#         (founder uploads via web UI, then re-runs workflow)
#
# Failure DOES block release (release-full.yml gates on this job's success).
# Bypass: rerun with VT_MAX_DETECTIONS env override or workflow_dispatch input.
#
# Required secret: VT_API_KEY  (free at virustotal.com/gui/sign-up)
# =============================================================================
name: VirusTotal Gate

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'GitHub release tag to scan (e.g. v1.0.1). Defaults to latest.'
        required: false
        default: ''
      max_detections:
        description: 'Max AV detections allowed before failing (default 2)'
        required: false
        default: '2'
  workflow_call:
    inputs:
      release_tag:
        type: string
        required: true
      max_detections:
        type: string
        required: false
        default: '2'
    secrets:
      VT_API_KEY:
        required: true

permissions:
  contents: read
  issues: write  # Create alert issue if detections exceed threshold

env:
  VT_MAX_DETECTIONS: ${{ inputs.max_detections || '2' }}
  RELEASE_TAG: ${{ inputs.release_tag || 'latest' }}

jobs:
  scan:
    name: Scan release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [ "$RELEASE_TAG" = "latest" ] || [ -z "$RELEASE_TAG" ]; then
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          else
            TAG="$RELEASE_TAG"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved release tag: $TAG"

      - name: Download release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p artifacts
          gh release download "${{ steps.release.outputs.tag }}" \
            --pattern '*.msi' \
            --pattern '*.exe' \
            --pattern '*.dmg' \
            --pattern '*.AppImage' \
            --pattern '*.deb' \
            --dir artifacts/ \
            || echo "No matching artifacts (expected for early tags)"
          ls -lh artifacts/ || true

      - name: Verify VT_API_KEY is set
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          if [ -z "$VT_API_KEY" ]; then
            echo "::error::VT_API_KEY secret not configured. Add it at repo Settings → Secrets."
            echo "Sign up free at https://www.virustotal.com/gui/sign-up to get an API key."
            exit 1
          fi
          echo "VT_API_KEY present ✓"

      - name: Scan each artifact via VT hash lookup
        id: scan
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        run: |
          set -e
          shopt -s nullglob
          artifacts=(artifacts/*)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "::warning::No artifacts found for ${{ steps.release.outputs.tag }} — skipping VT scan"
            echo "result=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          FAILED=0
          REPORT=""
          for f in "${artifacts[@]}"; do
            name=$(basename "$f")
            sha256=$(shasum -a 256 "$f" | awk '{print $1}')
            size=$(stat -c %s "$f" 2>/dev/null || stat -f %z "$f")
            size_mb=$((size / 1048576))

            echo "::group::$name (${size_mb}MB, sha256=$sha256)"

            # VT v3 file lookup — public endpoint, hash-based, no upload
            HTTP_CODE=$(curl -s -o /tmp/vt-response.json -w '%{http_code}' \
              -H "x-apikey: $VT_API_KEY" \
              "https://www.virustotal.com/api/v3/files/$sha256")

            case "$HTTP_CODE" in
              200)
                MALICIOUS=$(jq -r '.data.attributes.last_analysis_stats.malicious' /tmp/vt-response.json)
                SUSPICIOUS=$(jq -r '.data.attributes.last_analysis_stats.suspicious' /tmp/vt-response.json)
                TOTAL=$((MALICIOUS + SUSPICIOUS))
                echo "Detections: $MALICIOUS malicious + $SUSPICIOUS suspicious = $TOTAL"
                REPORT="$REPORT\n- $name: $TOTAL detections (max allowed: $VT_MAX_DETECTIONS)"
                if [ "$TOTAL" -gt "$VT_MAX_DETECTIONS" ]; then
                  echo "::error::$name exceeds detection threshold ($TOTAL > $VT_MAX_DETECTIONS)"
                  FAILED=1
                  # Capture top 5 vendors flagging
                  jq -r '.data.attributes.last_analysis_results | to_entries
                    | map(select(.value.category == "malicious" or .value.category == "suspicious"))
                    | .[0:5] | .[] | "  - \(.key): \(.value.result)"' /tmp/vt-response.json
                fi
                ;;
              404)
                echo "::warning::$name unknown to VT (sha256 not in DB)"
                if [ "$size_mb" -le 32 ]; then
                  echo "Uploading for fresh scan (size ${size_mb}MB ≤ 32MB free-tier limit)…"
                  UPLOAD_CODE=$(curl -s -o /tmp/vt-upload.json -w '%{http_code}' \
                    -H "x-apikey: $VT_API_KEY" \
                    -F "file=@$f" \
                    "https://www.virustotal.com/api/v3/files")
                  if [ "$UPLOAD_CODE" = "200" ]; then
                    echo "Upload accepted — scan in progress (results in ~2 min)"
                    REPORT="$REPORT\n- $name: uploaded for first-time scan (rerun gate in 5 min)"
                  else
                    echo "::warning::Upload failed (HTTP $UPLOAD_CODE)"
                    cat /tmp/vt-upload.json
                  fi
                else
                  echo "::error::$name is ${size_mb}MB > 32MB free-tier upload limit"
                  echo "MANUAL ACTION: founder must upload to https://virustotal.com/gui/home/upload"
                  echo "Then rerun this workflow to verify."
                  REPORT="$REPORT\n- $name: TOO LARGE (${size_mb}MB) — manual upload required"
                  FAILED=1
                fi
                ;;
              429)
                echo "::warning::Rate limited (VT free tier = 4 req/min). Sleeping 20s…"
                sleep 20
                # Retry once
                curl -s -o /tmp/vt-response.json -w '%{http_code}\n' \
                  -H "x-apikey: $VT_API_KEY" \
                  "https://www.virustotal.com/api/v3/files/$sha256" || true
                cat /tmp/vt-response.json | jq . || true
                ;;
              *)
                echo "::error::Unexpected HTTP $HTTP_CODE from VT API"
                cat /tmp/vt-response.json
                FAILED=1
                ;;
            esac

            echo "::endgroup::"
            # Free tier: 4 req/min — sleep 16s between artifacts
            sleep 16
          done

          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::VT gate FAILED — release must NOT ship until investigated"
            exit 1
          fi
          echo "All artifacts within detection threshold ✓"
          echo "result=pass" >> $GITHUB_OUTPUT

      - name: Open issue on detection
        if: failure() && steps.scan.outputs.result != 'skipped'
        uses: actions/github-script@v7
        env:
          REPORT: ${{ steps.scan.outputs.report }}
          TAG: ${{ steps.release.outputs.tag }}
        with:
          script: |
            const report = process.env.REPORT || 'No report available';
            const tag = process.env.TAG;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 VirusTotal gate FAILED for ${tag}`,
              body: `## VirusTotal scan exceeded detection threshold\n\n` +
                    `**Release**: \`${tag}\`\n` +
                    `**Threshold**: ${process.env.VT_MAX_DETECTIONS || '2'} detections\n\n` +
                    `### Per-artifact results\n${report}\n\n` +
                    `### Required actions\n` +
                    `1. Identify which AV vendors flagged (workflow logs)\n` +
                    `2. Submit false-positive appeals (see \`scripts/install/docs/av-submission-guide.md\`)\n` +
                    `3. DO NOT promote release to public download until appeals approved\n\n` +
                    `Workflow run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              labels: ['security', 'release-blocker', 'P0']
            });
