name: Sara Release Gate (Full)

# S207 — Release gate REALE completo (Opzione B).
# Esegue test_sara_stress_per_verticale.py su tutti i verticali + DB integrity
# usando self-hosted GitHub Actions runner su MacBook (zero-cost, outbound only).
# Il runner chiama orchestrator VOS che a sua volta SSH-a iMac e gira la pipeline live 3002.
#
# Setup runner una tantum (founder): vedi venture-os/docs/SETUP-SELFHOSTED-RUNNER.md
#
# Trigger:
#   - PR su voice-agent/**     → block merge se FAIL (required check)
#   - workflow_dispatch        → run manuale on-demand
#   - schedule daily           → smoke notturno (opzionale, disabilitato di default)
#
# Durata tipica: 5-12 min (full tier 1+2+3). Skip --skip-extended → 3-5 min.

on:
  pull_request:
    paths:
      - 'voice-agent/src/**'
      - 'voice-agent/tests/**'
      - 'voice-agent/requirements*.txt'
      - 'voice-agent/main.py'
      - 'scripts/sara-release-gate.sh'
      - '.github/workflows/sara-release-gate.yml'
  workflow_dispatch:
    inputs:
      tier:
        description: 'Gate tier (1=core, 2=extended, 3=full)'
        required: false
        default: '3'
        type: choice
        options: ['1', '2', '3']
      skip_extended:
        description: 'Skip tier 2 extended smoke (faster)'
        required: false
        default: false
        type: boolean

jobs:
  sara-gate:
    name: Sara Gate (self-hosted MacBook → iMac pipeline)
    # Self-hosted runner registrato su MacBook con labels:
    #   [self-hosted, macbook, fluxion]
    runs-on: [self-hosted, macbook, fluxion]
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Repo gira sul MacBook in /Volumes/MontereyT7/FLUXION/.
          # Il runner clona in _work/ ma orchestrator.py usa path canonico FLUXION_ROOT.
          # Necessario per pattern git pull origin master su iMac.
          fetch-depth: 0

      - name: Pre-flight — T7 mounted + repo canonico
        run: |
          set -e
          if [ ! -d "/Volumes/MontereyT7/FLUXION" ]; then
            echo "::error::T7 non montato — /Volumes/MontereyT7/FLUXION mancante"
            exit 2
          fi
          if [ ! -x "/Volumes/MontereyT7/FLUXION/scripts/sara-release-gate.sh" ]; then
            echo "::error::scripts/sara-release-gate.sh non eseguibile"
            exit 2
          fi
          if [ ! -f "$HOME/venture-os/components/sara-gate-orchestrator/orchestrator.py" ]; then
            echo "::error::VOS orchestrator mancante — installa venture-os/components/sara-gate-orchestrator/"
            exit 2
          fi
          echo "OK pre-flight"

      - name: Sync repo canonico con commit CI
        # GitHub Actions clona in _work/; il gate USA /Volumes/MontereyT7/FLUXION/
        # come SSOT. Sincronizziamo lì il SHA del workflow per coerenza.
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -e
          cd /Volumes/MontereyT7/FLUXION
          git fetch origin --quiet
          git checkout --quiet ${GITHUB_SHA} || {
            echo "::warning::checkout ${GITHUB_SHA} fallito, uso HEAD attuale"
          }
          echo "Canonico HEAD: $(git rev-parse --short HEAD)"

      - name: Build orchestrator args
        id: args
        env:
          TIER: ${{ inputs.tier || '3' }}
          SKIP_EXTENDED: ${{ inputs.skip_extended || 'false' }}
        run: |
          ARGS=""
          if [ "$TIER" = "1" ]; then
            ARGS="$ARGS --tier=1"
          elif [ "$TIER" = "2" ]; then
            ARGS="$ARGS --tier=2"
          fi
          if [ "$SKIP_EXTENDED" = "true" ]; then
            ARGS="$ARGS --skip-extended"
          fi
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "Args calcolati: '$ARGS'"

      - name: Run Sara Gate via VOS orchestrator
        env:
          SARA_GATE_ARGS: ${{ steps.args.outputs.args }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          # Big Sur python3 sistema (~/venture-os pattern stdlib-only, no venv)
          python3 "$HOME/venture-os/components/sara-gate-orchestrator/orchestrator.py"

      - name: Upload report JSON (sempre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sara-gate-report-${{ github.run_id }}
          path: /Volumes/MontereyT7/FLUXION/docs/launch/sara-release-gate-reports/release-gate-*.json
          retention-days: 30
          if-no-files-found: warn

      - name: Append run log VOS as artifact
        if: always()
        run: |
          tail -1 "$HOME/venture-os/state/sara-gate-runs.jsonl" 2>/dev/null > /tmp/last-run.jsonl || echo "{}" > /tmp/last-run.jsonl
          cat /tmp/last-run.jsonl

      - name: Upload VOS run entry
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sara-gate-vos-entry-${{ github.run_id }}
          path: /tmp/last-run.jsonl
          retention-days: 90
