# =============================================================================
# FLUXION — Smoke Test Installers (S184 α.3.0-C)
# =============================================================================
# Cross-OS recurring smoke gate: validates that voice-agent/main.py CLI flags
# (--version + --health-check) work on every supported platform.
#
# Triggers:
#   - push to master touching voice-agent/ or this workflow
#   - manual dispatch (re-run after dependency changes)
#   - daily schedule (catch upstream PyPI regressions)
#
# Failure means the next release MUST NOT ship until fixed.
# =============================================================================
name: Smoke Test Installers

on:
  push:
    branches: [master]
    paths:
      - 'voice-agent/**'
      - '.github/workflows/smoke-test-installers.yml'
  workflow_dispatch:
  schedule:
    # 06:00 UTC daily — catches PyPI breaking releases overnight
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  smoke-test:
    name: Smoke (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            python: '3.11'
          - os: macos-13
            platform: macos-intel
            python: '3.11'
          - os: macos-14
            platform: macos-arm
            python: '3.11'
          - os: windows-latest
            platform: windows
            python: '3.11'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: voice-agent/requirements.txt

      - name: Install voice-agent deps
        working-directory: ./voice-agent
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # Install only what health-check needs (orchestrator + booking_state_machine imports)
          # Full requirements may include heavy native deps not needed for smoke test
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # =========================================================================
      # Test 1: --version (no deps required, must always pass)
      # =========================================================================
      - name: '[Smoke 1] --version exits 0 with version line'
        working-directory: ./voice-agent
        shell: bash
        run: |
          set -e
          OUT=$(python main.py --version)
          echo "$OUT"
          echo "$OUT" | grep -qE 'FLUXION Voice Agent [0-9]+\.[0-9]+\.[0-9]+' || {
            echo "::error::--version output missing semver"
            exit 1
          }

      # =========================================================================
      # Test 2: --health-check (validates imports + tmpfs + socket bind)
      # =========================================================================
      - name: '[Smoke 2] --health-check reports healthy'
        working-directory: ./voice-agent
        shell: bash
        run: |
          set +e
          OUT=$(python main.py --health-check)
          EXIT=$?
          set -e
          echo "Output: $OUT"
          echo "Exit code: $EXIT"

          # Authoritative gate: exit 0 + "status": "healthy"
          if [ "$EXIT" -ne 0 ]; then
            echo "::error::health-check exited $EXIT (expected 0) on ${{ matrix.platform }}"
            exit 1
          fi
          echo "$OUT" | grep -q '"status": "healthy"' || {
            echo "::error::health-check did not report healthy on ${{ matrix.platform }}"
            echo "Full output: $OUT"
            exit 1
          }

      # =========================================================================
      # Test 3: --health-check exit code is authoritative for CI
      #         (deliberate fail to prove the gate works — only on dispatch)
      # =========================================================================
      - name: '[Smoke 3] Verify gate fails when imports missing'
        if: github.event_name == 'workflow_dispatch'
        working-directory: ./voice-agent
        shell: bash
        run: |
          # Run health-check from a directory where src/ is NOT on path
          set +e
          cd /tmp
          python "$GITHUB_WORKSPACE/voice-agent/main.py" --health-check
          EXIT=$?
          set -e
          # We expect this to either succeed (deps reachable via sys.path manipulation)
          # OR fail cleanly with exit 1 — never crash with non-1 exit.
          if [ "$EXIT" -ne 0 ] && [ "$EXIT" -ne 1 ]; then
            echo "::error::Unexpected exit code $EXIT (expected 0 or 1)"
            exit 1
          fi
          echo "Gate behaves correctly (exit $EXIT)"

  summary:
    name: Smoke Summary
    needs: smoke-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Aggregate result
        run: |
          if [ "${{ needs.smoke-test.result }}" != "success" ]; then
            echo "::error::Smoke test FAILED — release must NOT ship until resolved"
            exit 1
          fi
          echo "All platforms healthy ✓"
